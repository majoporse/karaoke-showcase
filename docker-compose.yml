services:
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    container_name: karaoke-frontend
    restart: unless-stopped

  voice-separation:
    build:
      context: ./services/voice-separation-service
      dockerfile: Dockerfile
    container_name: karaoke-voice-separation
    network_mode: host
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - PORT=8001
      - HOST=${HOST}
      - LOG_LEVEL=${LOG_LEVEL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    volumes:
      - voice_model_cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lyrics-extraction:
    build:
      context: ./services/lyrics-extraction-service
      dockerfile: Dockerfile
    container_name: karaoke-lyrics-extraction
    network_mode: host
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - PORT=8002
      - HOST=${HOST}
      - LOG_LEVEL=${LOG_LEVEL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    volumes:
      - lyrics_model_cache:/app/.cache/huggingface
      - whisper_model_cache:/app/.cache/whisper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  song-management:
    build:
      context: ./services/song-management-service
      dockerfile: Dockerfile
    container_name: karaoke-song-management
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ELASTICSEARCH_INDEX=${ELASTICSEARCH_INDEX}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - ENVIRONMENT=${ENVIRONMENT}
      - LOG_LEVEL=${LOG_LEVEL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: karaoke-minio
    network_mode: host
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  orchestrator:
    build:
      context: ./services/orchestrator-service
      dockerfile: Dockerfile
    container_name: karaoke-orchestrator
    network_mode: host
    environment:
      - VOICE_SEPARATION_URL=${VOICE_SEPARATION_URL}
      - LYRICS_EXTRACTION_URL=${LYRICS_EXTRACTION_URL}
      - SONG_MANAGEMENT_URL=${SONG_MANAGEMENT_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - SERVER_URL=${SERVER_URL}
      - REDIS_URL=${REDIS_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PORT=${PORT}
      - HOST=${HOST}
      - LOG_LEVEL=${LOG_LEVEL}
      - YOUTUBE_COOKIES_PATH=${YOUTUBE_COOKIES_PATH}
      - POT_URL=${POT_URL}
      - PROXY_URL=${PROXY_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      song-management:
        condition: service_healthy
      voice-separation:
        condition: service_healthy
      lyrics-extraction:
        condition: service_healthy
      bgutil-pot-provider:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bgutil-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: karaoke-bgutil-pot-provider
    network_mode: host
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: karaoke-redis
    network_mode: host
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes

  rq-worker:
    build:
      context: ./services/orchestrator-service
      dockerfile: worker/Dockerfile
    container_name: karaoke-rq-worker
    network_mode: host
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - REDIS_URL=${REDIS_URL}
      - VOICE_SEPARATION_URL=${VOICE_SEPARATION_URL}
      - LYRICS_EXTRACTION_URL=${LYRICS_EXTRACTION_URL}
      - SONG_MANAGEMENT_URL=${SONG_MANAGEMENT_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    depends_on:
      redis:
        condition: service_healthy
      voice-separation:
        condition: service_healthy
      lyrics-extraction:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: karaoke-postgres
    network_mode: host
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  voice_model_cache:
    driver: local
  lyrics_model_cache:
    driver: local
  whisper_model_cache:
    driver: local
  minio_data:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local