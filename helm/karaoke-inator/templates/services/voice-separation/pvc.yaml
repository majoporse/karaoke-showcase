{{- if .Values.voiceSeparation.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: voice-separation-model-cache
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "karaoke-inator.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.voiceSeparation.persistence.size }}
{{- end }}
