# ============================================================================
# TEMPO HELM CHART - CUSTOM VALUES
# ============================================================================

# Tempo Helm chart dependency values
tempo:
  # Number of replicas
  replicas: 1

  # Image configuration
  image:
    repository: grafana/tempo
    tag: "2.8.2"
    pullPolicy: IfNotPresent

  # Resource limits and requests
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Persistence configuration
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: "local-path"
    accessModes:
      - ReadWriteOnce

  # Service port
  service:
    port: 3200

  # Tempo configuration file (YAML string)
  config: |
    memberlist:
      cluster_label: "tempo"
    multitenancy_enabled: false
    usage_report:
      reporting_enabled: true
    compactor:
      compaction:
        block_retention: 24h
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 10m
    server:
      http_listen_port: 3200
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    querier: {}
    query_frontend: {}
    overrides:
      defaults: {}
