
# --- GLOBAL SETTINGS ---
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker's embedded DNS resolver
    # Required for using variables in proxy_pass (prevents crash if service is down)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    # --- 1. HTTP REDIRECT (Port 80) ---
    server {
        listen 80;
        server_name hatal.cc www.hatal.cc;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- 2. FRONTEND PROXY (Port 443) ---
    server {
        listen 443 ssl;
        http2 on;
        server_name hatal.cc www.hatal.cc;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/live/hatal.cc/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/hatal.cc/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            # Use variable so Nginx starts even if frontend container is still booting
            set $upstream_frontend http://frontend:80;

            limit_req zone=general burst=20 nodelay;

            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Required for React/Vite HMR or real-time features)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }

        # NOTE: Static assets are now handled by the 'frontend' service itself.
        # No 'root' or 'try_files' here.
    }

    # --- 3. ORCHESTRATOR API PROXY (Port 8000) ---
    server {
        listen 8000 ssl;
        http2 on;
        server_name hatal.cc www.hatal.cc;

        ssl_certificate /etc/nginx/ssl/live/hatal.cc/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/hatal.cc/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            set $upstream_orchestrator http://orchestrator:8000;

            limit_req zone=api burst=30 nodelay;

            proxy_pass $upstream_orchestrator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }

        location /health {
            set $health_backend http://orchestrator:8000/health;
            access_log off;
            proxy_pass $health_backend;
            proxy_http_version 1.1;
        }
    }

    # MinIO S3 API (Port 9000)
    server {
        listen 9000 ssl;
        http2 on;
        server_name hatal.cc; # Recommended to use your actual domain

        ssl_certificate /etc/nginx/ssl/live/hatal.cc/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/hatal.cc/privkey.pem;

        # Optimized for MinIO large uploads
        ignore_invalid_headers off;
        client_max_body_size 0; # Disable size limit for large S3 objects
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300;
            # Default is HTTP/1, but keepalive is only enabled in HTTP/1.1
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;

            proxy_pass http://minio:9000;
        }
    }
    
    # MinIO Console (Port 9001) 
    server {
        listen 9001 ssl;
        http2 on;
        server_name hatal.cc;

        ssl_certificate /etc/nginx/ssl/live/hatal.cc/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/hatal.cc/privkey.pem;

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_pass http://minio:9001;
        }
    }
}
