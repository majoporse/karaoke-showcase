server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Try to serve the file, then the directory, then fall back to index.html
        try_files $uri $uri/ /index.html;
    }

    # Help Nginx find the JS/CSS files Vite generates
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}