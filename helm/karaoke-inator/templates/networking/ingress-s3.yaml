{{- if .Values.minio.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-s3-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "karaoke-inator.labels" . | nindent 4 }}
    app: minio
  annotations:
    cert-manager.io/cluster-issuer: zerossl-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - s3.{{ .Values.global.domain }}
      secretName: s3-hatal-cc-tls
  rules:
    - host: s3.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
{{- end }}
