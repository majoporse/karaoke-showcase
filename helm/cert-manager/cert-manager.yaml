# Let's Encrypt Production Issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@hatal.cc
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: traefik

---
# ZeroSSL Production Issuer (with EAB credentials)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zerossl-prod
spec:
  acme:
    server: https://acme.zerossl.com/v2/DV90
    email: admin@hatal.cc
    privateKeySecretRef:
      name: zerossl-prod-key
    externalAccountBinding:
      keyID: ""
      keySecretRef:
        name: zerossl-eab-hmac
        key: hmac-key
    solvers:
      - http01:
          ingress:
            class: traefik
