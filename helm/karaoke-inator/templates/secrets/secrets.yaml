apiVersion: v1
kind: Secret
metadata:
  name: karaoke-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "karaoke-inator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # PostgreSQL credentials
  {{- if .Values.postgresql.auth.password }}
  postgresql-password: {{ .Values.postgresql.auth.password | quote }}
  postgresql-url: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Values.services.postgresql.host }}:{{ .Values.services.postgresql.port }}/{{ .Values.postgresql.auth.database }}"
  {{- else }}
  # PostgreSQL password MUST be provided at install time
  # Command: --set postgresql.auth.password="YOUR_SECURE_PASSWORD"
  postgresql-password: ""
  postgresql-url: ""
  {{- end }}
  
  # MinIO credentials
  {{- if .Values.minio.auth.rootUser }}
  minio-root-user: {{ .Values.minio.auth.rootUser | quote }}
  {{- else }}
  # MinIO root user MUST be provided at install time
  # Command: --set minio.auth.rootUser="minio"
  minio-root-user: ""
  {{- end }}
  
  {{- if .Values.minio.auth.rootPassword }}
  minio-root-password: {{ .Values.minio.auth.rootPassword | quote }}
  {{- else }}
  # MinIO root password MUST be provided at install time
  # Command: --set minio.auth.rootPassword="YOUR_SECURE_PASSWORD"
  minio-root-password: ""
  {{- end }}

  {{- if .Values.services.elasticsearch.auth }}
  elastic-user: {{ .Values.services.elasticsearch.auth.user}}
  {{- else }}
  elastic-user: ""
  {{- end }}

  {{- if .Values.services.elasticsearch.auth.password }}
  elastic-password: {{ .Values.services.elasticsearch.auth.password }}
  {{- else }}
  elastic-password: ""
  {{- end }}
